# Netlify configuration for The Great Fish Rescue flipbook.
#
# This is a pure static site (plain HTML/CSS/JS) — there is no build step.
# The site root contains index.html, which redirects to /story/ebook.html.
# Media lives in "assets/" and is referenced from /story/ebook.html via
# relative paths ("../assets/..."), so the whole repo root must be published
# as-is to keep those relative paths valid.

[build]
  # Publish the repository root unchanged.
  publish = "."
  # No build command — nothing to compile.
  command = ""

# Long-cache the heavy media so repeat visits and page flips are smooth.
# HTML stays uncached so updates show immediately.
[[headers]]
  for = "/assets/pages/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/ui/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Self-hosted web fonts are immutable — cache them for a year.
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
